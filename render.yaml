# Render deployment blueprint.
# Connect this GitHub repo at https://render.com → New → Blueprint,
# or create a Web Service manually with the build/start commands below.
services:
  - type: web
    name: romantic-hp-site
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # Paste your free MongoDB Atlas connection string here in the Render
      # dashboard (Environment tab). Kept secret, not committed to git.
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: romantic_hp
      # The password to enter the site (change it to whatever you like)
      - key: SITE_PASSWORD
        value: polkadot
      # Random secret to sign the login cookie (generated once by Render)
      - key: AUTH_SECRET
        generateValue: true
