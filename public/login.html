<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Portrait Hole · Whisper the Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Tangerine:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --gold: #d4af37; --gold-soft: #e8c969; --ink: #2b1d0e;
      --parchment: #f3e3c3; --parchment-deep: #e7d2a6;
      --maroon: #5a0f15; --maroon-deep: #3a0a0e;
      --glow: rgba(212, 175, 55, 0.55); --shadow: rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      padding: 1.5rem; color: #f6e8c5;
      font-family: 'Cormorant Garamond', Georgia, serif;
      background:
        radial-gradient(1100px 700px at 50% -10%, #2a1840 0%, transparent 60%),
        radial-gradient(800px 600px at 85% 25%, #2b0f1a 0%, transparent 55%),
        linear-gradient(160deg, #120b1c 0%, #1d1230 45%, #0c0716 100%);
      background-attachment: fixed;
    }
    .door {
      width: min(440px, 94vw);
      text-align: center;
      background:
        radial-gradient(120% 120% at 0% 0%, #fbf0d4 0%, var(--parchment) 45%, var(--parchment-deep) 100%);
      color: var(--ink);
      border: 1px solid #b8985a; border-radius: 16px; padding: 2.4rem 2rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 40px var(--glow);
      animation: rise 0.6s ease;
    }
    .door.shake { animation: shake 0.45s ease; }
    @keyframes rise { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes shake { 10%,90% { transform: translateX(-2px);} 30%,70% { transform: translateX(6px);} 50% { transform: translateX(-8px);} }
    .door__rune { font-size: 2.6rem; filter: drop-shadow(0 0 10px var(--glow)); }
    .door__title {
      font-family: 'Cinzel Decorative', serif; font-weight: 900;
      color: var(--maroon); margin: 0.4rem 0 0.2rem; font-size: 1.7rem;
    }
    .door__sub {
      font-family: 'Tangerine', cursive; font-size: 2rem; line-height: 1;
      color: var(--maroon-deep); margin: 0 0 1.4rem;
    }
    .door__field { position: relative; }
    .door__input {
      width: 100%; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
      text-align: center; letter-spacing: 0.12em; color: var(--ink);
      background: rgba(255,255,255,0.5); border: 1px solid #c2a268;
      border-radius: 10px; padding: 0.85rem 1rem; outline: none;
    }
    .door__input:focus { border-color: var(--maroon); box-shadow: 0 0 0 3px rgba(90,15,21,0.15); }
    .door__button {
      margin-top: 1.1rem; width: 100%; cursor: pointer;
      font-family: 'Cinzel', serif; letter-spacing: 0.14em; text-transform: uppercase;
      font-size: 0.9rem; color: #fdf3d6;
      background: linear-gradient(180deg, var(--maroon), var(--maroon-deep));
      border: 1px solid #7a1620; border-radius: 999px; padding: 0.85rem 1.6rem;
      box-shadow: 0 8px 20px var(--shadow); transition: transform 0.2s ease, filter 0.2s ease;
    }
    .door__button:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .door__error { min-height: 1.4em; margin: 0.9rem 0 0; color: var(--maroon); font-style: italic; }
  </style>
</head>
<body>
  <main class="door" id="door">
    <div class="door__rune">⚯</div>
    <h1 class="door__title">The Portrait Hole</h1>
    <p class="door__sub">Whisper the password, love</p>
    <form id="gate-form" autocomplete="off">
      <div class="door__field">
        <input
          id="password"
          class="door__input"
          type="password"
          placeholder="• • • • • • • •"
          aria-label="Password"
          autocomplete="off"
          autofocus
        />
      </div>
      <button class="door__button" type="submit">Enter ✦</button>
      <p class="door__error" id="error" role="alert"></p>
    </form>
  </main>

  <script>
    const form = document.getElementById('gate-form');
    const input = document.getElementById('password');
    const error = document.getElementById('error');
    const door = document.getElementById('door');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.textContent = '';
      try {
        const res = await fetch('/api/unlock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
        });
        if (res.ok) {
          window.location.href = '/';
          return;
        }
        throw new Error('wrong');
      } catch (err) {
        error.textContent = 'The Fat Lady shakes her head… try again.';
        door.classList.remove('shake');
        void door.offsetWidth;
        door.classList.add('shake');
        input.value = '';
        input.focus();
      }
    });
  </script>
</body>
</html>
